name: task-manager
services:
  db:
    image: postgres:18
    container_name: db_postgres
    env_file:
      - .env.db
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - services-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  task-manager-api:
    build:
      context: ../.
      dockerfile: deployments/Dockerfile
    image: task-manager-api
    container_name: task-manager-api
    env_file:
      - .env.app
    networks:
      - services-network
    ports:
      - "80:8080"
    depends_on:
      db:
        condition: service_healthy

networks:
  services-network:

volumes:
  postgres-data: